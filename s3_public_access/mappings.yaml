# Framework Mappings — S3 Public Access Auditor
# Schema version 0.1.0
#
# Single source of truth for control relationships across frameworks.
# SOC 2 is the primary audit-facing framework; CIS AWS Foundations
# Benchmark drives the technical measurements; ISO 27001:2022 and
# NIST 800-53 Rev 5 are cross-references.

schema_version: "0.1.0"
collector: "s3-public-access"
collector_version: "0.1.0"

# ---------------------------------------------------------------------
# SOC 2 Trust Services Criteria (2017, revised 2022)
# Official AICPA language. Do not paraphrase.
# ---------------------------------------------------------------------
soc2_controls:
  CC6.1:
    title: "Logical and Physical Access Controls"
    criterion: >
      The entity implements logical access security software,
      infrastructure, and architectures over protected information
      assets to protect them from security events to meet the
      entity's objectives.
    relevance_to_collector: >
      S3 bucket access controls (Block Public Access, bucket policies,
      and ACLs) are the logical access security mechanisms for object
      storage. Misconfiguration permitting public access represents a
      failure of logical access security.

  CC6.6:
    title: "Protection Against Threats from External Sources"
    criterion: >
      The entity implements logical access security measures to
      protect against threats from sources outside its system
      boundaries.
    relevance_to_collector: >
      A publicly accessible S3 bucket is, by definition, accessible
      from outside the system boundary without authentication. This
      is the canonical CC6.6 failure mode.

# ---------------------------------------------------------------------
# Technical checks — CIS AWS Foundations Benchmark v5.0.0
# These are what the collector actually measures.
# ---------------------------------------------------------------------
technical_checks:
  CIS-AWS-2.1.4:
    title: "Ensure that S3 Buckets are configured with 'Block public access (bucket settings)'"
    rationale: >
      Bucket-level Block Public Access settings prevent bucket
      policies and ACLs from granting public access. All four
      settings (BlockPublicAcls, IgnorePublicAcls, BlockPublicPolicy,
      RestrictPublicBuckets) should be enabled for defense in depth.
    measurement:
      scope: "bucket"
      severity: "high"
    maps_to:
      soc2: ["CC6.1", "CC6.6"]
      cis_controls_v8: ["3.3", "14.6"]
      iso_27001_2022: ["A.5.10", "A.8.3"]
      nist_800_53_r5: ["AC-3", "AC-4", "SC-7"]

  CIS-AWS-2.1.5:
    title: "Ensure that S3 Buckets are not publicly accessible via bucket policy or ACL"
    rationale: >
      Even with Block Public Access enabled, bucket policies and
      ACLs may grant access to AllUsers or AuthenticatedUsers, or
      use Principal:* without restricting conditions. These grants
      expose objects to anonymous access.
    measurement:
      scope: "bucket"
      severity: "critical"
    maps_to:
      soc2: ["CC6.1", "CC6.6"]
      cis_controls_v8: ["3.3", "14.6"]
      iso_27001_2022: ["A.5.10", "A.8.3"]
      nist_800_53_r5: ["AC-3", "AC-4", "SC-7"]

  EXT-ACCT-BPA-01:
    title: "Ensure account-level S3 Block Public Access is fully enabled"
    rationale: >
      Account-level Block Public Access applies to all buckets
      regardless of individual configuration, providing defense in
      depth. This is a collector-defined extension beyond CIS
      Benchmark v5.0.0, which does not enumerate account-level BPA
      as a separate control.
    measurement:
      scope: "account"
      severity: "high"
    maps_to:
      soc2: ["CC6.1", "CC6.6"]
      cis_controls_v8: ["3.3", "14.6"]
      iso_27001_2022: ["A.5.10", "A.8.3"]
      nist_800_53_r5: ["AC-3", "SC-7"]

# ---------------------------------------------------------------------
# Scope declarations — what this collector does NOT cover.
# Surfaced in the report so auditors understand the boundary.
# ---------------------------------------------------------------------
out_of_scope_v0_1:
  - "Object-level ACLs (per-object public access)"
  - "S3 Access Points and their public access settings"
  - "Cross-account bucket policies with specific external account grants"
  - "Buckets where the collector receives AccessDenied on policy or ACL reads"
  - "VPC endpoint policies and bucket access via private networking"

# ---------------------------------------------------------------------
# Framework reference labels
# ---------------------------------------------------------------------
framework_labels:
  soc2: "SOC 2 Trust Services Criteria (2017, rev. 2022)"
  cis_aws: "CIS AWS Foundations Benchmark v5.0.0"
  cis_controls_v8: "CIS Controls v8.1"
  iso_27001_2022: "ISO/IEC 27001:2022 Annex A"
  nist_800_53_r5: "NIST SP 800-53 Rev. 5"

# ---------------------------------------------------------------------
# IAM permissions required by this collector (read-only).
# Included in evidence pack as collector_iam_policy.json so auditors
# can verify the collector could not modify state during collection.
# ---------------------------------------------------------------------
required_iam_permissions:
  - "s3:ListAllMyBuckets"
  - "s3:GetBucketLocation"
  - "s3:GetBucketPolicy"
  - "s3:GetBucketPolicyStatus"
  - "s3:GetBucketAcl"
  - "s3:GetBucketPublicAccessBlock"
  - "s3:GetAccountPublicAccessBlock"
